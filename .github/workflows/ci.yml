name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Run tests
        working-directory: ./server
        env:
          JWT_SECRET: test_secret
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: password123
          DB_NAME: shade_system_test
          WEATHER_API_KEY: fake_key
          WEATHER_CITY: Holon,IL
        run: npm test