<svg width="100%" viewBox="0 0 760 570" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#737270" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#639922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Row 1: External clients ── -->

<rect x="40" y="30" width="200" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="140" y="54" text-anchor="middle" font-size="14" font-weight="600" fill="#0c447c">React client</text>
<text x="140" y="73" text-anchor="middle" font-size="12" fill="#185fa5">Vercel · Socket.io client</text>

<rect x="520" y="30" width="200" height="56" rx="8" fill="#faeee7" stroke="#993c1d" stroke-width="0.5"/>
<text x="620" y="54" text-anchor="middle" font-size="14" font-weight="600" fill="#712b13">IoT sensors</text>
<text x="620" y="73" text-anchor="middle" font-size="12" fill="#993c1d">HTTP POST / simulator</text>

<!-- Arrow: Browser → Cloudflare -->
<line x1="140" y1="86" x2="140" y2="112" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>
<text x="148" y="102" font-size="11" fill="#3d3d3d">REST + WS</text>

<!-- Arrow: IoT → EC2 top -->
<line x1="620" y1="86" x2="620" y2="183" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>
<text x="628" y="138" font-size="11" fill="#3d3d3d">Sensor data</text>

<!-- ── Row 2: Cloudflare Tunnel ── -->

<rect x="70" y="112" width="310" height="50" rx="8" fill="#f0eee8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="225" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Cloudflare Tunnel</text>
<text x="225" y="151" text-anchor="middle" font-size="12" fill="#555">HTTPS proxy · REST + WebSocket</text>

<!-- Arrow: Cloudflare → Express -->
<line x1="205" y1="162" x2="178" y2="219" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ── EC2 Docker Container ── -->

<rect x="30" y="185" width="700" height="265" rx="16" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="380" y="207" text-anchor="middle" font-size="13" font-weight="600" fill="#444">AWS EC2 — Docker container</text>

<!-- Express API -->
<rect x="50" y="220" width="255" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="177" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Express API server</text>
<text x="177" y="263" text-anchor="middle" font-size="12" fill="#0f6e56">JWT · Helmet · rate limit</text>

<!-- Decision Engine -->
<rect x="450" y="220" width="245" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="572" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#3c3489">Decision engine</text>
<text x="572" y="263" text-anchor="middle" font-size="12" fill="#534ab7">Score-based automation</text>

<!-- Arrow: Express → Decision Engine -->
<line x1="305" y1="248" x2="448" y2="248" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Scheduler -->
<rect x="50" y="315" width="200" height="56" rx="8" fill="#faeedb" stroke="#854f0b" stroke-width="0.5"/>
<text x="150" y="339" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">Scheduler</text>
<text x="150" y="358" text-anchor="middle" font-size="12" fill="#854f0b">node-cron · every 5 s</text>

<!-- Arrow: Scheduler → Express -->
<line x1="155" y1="315" x2="172" y2="278" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Weather Service -->
<rect x="295" y="315" width="200" height="56" rx="8" fill="#faeee7" stroke="#993c1d" stroke-width="0.5"/>
<text x="395" y="339" text-anchor="middle" font-size="14" font-weight="600" fill="#712b13">Weather service</text>
<text x="395" y="358" text-anchor="middle" font-size="12" fill="#993c1d">Retry · cache fallback</text>

<!-- Arrow: Scheduler → Weather Service -->
<line x1="250" y1="343" x2="293" y2="343" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Socket.io -->
<rect x="530" y="315" width="175" height="56" rx="8" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.5"/>
<text x="617" y="339" text-anchor="middle" font-size="14" font-weight="600" fill="#27500a">Socket.io</text>
<text x="617" y="358" text-anchor="middle" font-size="12" fill="#3b6d11">Real-time broadcast</text>

<!-- Arrow: Express → Socket.io (across and down) -->
<path d="M305 256 L617 256 L617 313" fill="none" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Live updates: Socket.io → Browser (dashed green, right side) -->
<path d="M705 343 L745 343 L745 12 L242 12 L242 28" fill="none" stroke="#639922" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ag)"/>
<text x="748" y="200" font-size="11" fill="#3d3d3d" text-anchor="middle" transform="rotate(90 748 200)">Live updates</text>

<!-- ── Arrows: EC2 → External data stores (straight down from EC2 bottom) ── -->

<!-- EC2 → RDS -->
<line x1="176" y1="450" x2="176" y2="488" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>
<text x="184" y="472" font-size="11" fill="#3d3d3d">mysql2 pool</text>

<!-- EC2 → S3 -->
<line x1="584" y1="450" x2="584" y2="488" stroke="#737270" stroke-width="1.5" marker-end="url(#a)"/>
<text x="592" y="472" font-size="11" fill="#3d3d3d">file upload</text>

<!-- ── Row 4: External AWS Services ── -->

<rect x="66" y="488" width="220" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="176" y="512" text-anchor="middle" font-size="14" font-weight="600" fill="#0c447c">AWS RDS</text>
<text x="176" y="531" text-anchor="middle" font-size="12" fill="#185fa5">MySQL 8.0 · managed</text>

<rect x="474" y="488" width="220" height="56" rx="8" fill="#faeee7" stroke="#993c1d" stroke-width="0.5"/>
<text x="584" y="512" text-anchor="middle" font-size="14" font-weight="600" fill="#712b13">AWS S3</text>
<text x="584" y="531" text-anchor="middle" font-size="12" fill="#993c1d">Object storage · images</text>

</svg>
