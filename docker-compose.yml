# ==========================================
# 🐳 Docker Compose Configuration
# @description Orchestrates the Smart Shade System microservices (Database & API).
# @version 1.0 (Final Refactor)
# ==========================================
version: '3.8'

services:
  # ==========================================
  # 🗄️ MySQL Database Service
  # ==========================================
  mysqldb:
    image: mysql:8.0
    container_name: shade_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: shade_system_test
    ports:
      - "3307:3306" # Mapped to 3307 externally to avoid local conflicts
    volumes:
      - mysql_data:/var/lib/mysql
      # Mounts the schema file to auto-initialize the database on first run
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ==========================================
  # 🚀 Node.js Backend Service
  # ==========================================
  server:
    build: ./server
    container_name: shade_server
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - PORT=3001
      - DB_HOST=mysqldb
      - DB_USER=root
      - DB_PASSWORD=password123
      - DB_NAME=shade_system_test
      - TZ=Asia/Jerusalem
      - CORS_ORIGINS=http://localhost:5173
    
    # --- Live Sync & Persistence ---
    volumes:
      - ./server:/app                 # Live code sync (Hot Reloading)
      - /app/node_modules             # Protect container's linux dependencies
      - ./server/uploads:/app/uploads # Persist uploaded room maps
      
    depends_on:
      mysqldb:
        condition: service_healthy

volumes:
  mysql_data:
    # Named volume for persistent database storage