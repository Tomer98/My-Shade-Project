# ==========================================
# 🐳 Docker Compose - Production Configuration
# @description Runs only the Node.js server.
# Database: AWS RDS (external managed MySQL)
# Storage:  AWS S3 (external object storage)
# Usage: docker-compose -f docker-compose.prod.yml up -d
# ==========================================
version: '3.8'

services:
  server:
    build: ./server
    container_name: shade_server
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    # No environment: block here intentionally —
    # all config comes from .env to avoid override bugs
